name: Publish Release

on:
  push:
    tags:
      - "*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write

    steps:
      - uses: actions/checkout@v3
      - uses: ghalactic/github-release-from-tag@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}