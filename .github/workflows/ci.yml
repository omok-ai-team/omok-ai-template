name: Python CI

on:
  push:
    branches: [ main, feature-* ]    # main과 모든 feature 브랜치에 적용
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'  # 원하는 파이썬 버전

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with ruff
      run: ruff check .

    - name: Check code style with black
      run: black --check .

    - name: Run tests with pytest
      run: pytest